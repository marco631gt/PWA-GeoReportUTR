<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - GeoReport</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        h1 {
            color: #38bdf8;
        }

        p {
            color: #94a3b8;
            max-width: 80%;
        }

        button {
            margin-top: 25px;
            background: #38bdf8;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="icon">📡❌</div>
    <h1>You are in offline mode</h1>
    <p>It appears you don't have an internet connection and this page hasn't been previously saved.</p>
    <p><strong>But don't worry:</strong> You can still return to the homepage and create new reports; they will be savedlocally.</p>
    <button onclick="window.location.href='./index.html'">Return to Homepage</button>
</body>

</html>
