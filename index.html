<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoReport UTR</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#38bdf8">
</head>

<body>
    <nav class="navbar">
        <div class="nav-content">
            <strong>GeoReport</strong> <span>UTR</span>
        </div>
    </nav>

    <header>
        <div id="status">Verifying conection...</div>
    </header>

    <main>
        <section class="form-section">
            <form id="form-report">
                <h2>New Report</h2>
                <input type="text" id="input-title" placeholder="What flaw did you find?" required>
                <textarea id="input-desc" placeholder="Detailed description..." required></textarea>

                <div id="photo-container">
                    <div id="source-selector">
                        <p>How do you want to attach the photo?</p>
                        <div class="options-row">
                            <button type="button" id="btn-use-camera" class="btn-option">Use Camara</button>
                            <button type="button" id="btn-use-file" class="btn-option">Upload file</button>
                        </div>
                    </div>

                    <div id="camera-live" style="display: none;">
                        <video id="video" autoplay playsinline style="width: 100%; border-radius: 8px;"></video>
                        <button type="button" id="btn-capture" class="btn-send" style="background: #059669;">Take photo</button>
                        <canvas id="canvas" style="display: none;"></canvas>
                    </div>

                    <input type="file" id="input-photo" accept="image/*" style="display: none;">

                    <div id="preview-container">
                        <img id="temp-preview"
                            style="display: none; width: 100%; margin-top: 10px; border-radius: 8px;">
                        <p id="photo-text"></p>
                    </div>
                </div>

                <button type="submit" id="btn-send">SEND REPORT</button>
            </form>
        </section>

        <section class="list-section">
            <h2>RECENT REPORTS</h2>
            <ul id="reports-list"></ul>
        </section>
    </main>

    <button class="fab" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">+</button>

    <script src="db.js"></script>
    <script src="app.js"></script>
</body>

</html>
